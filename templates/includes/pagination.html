{% if is_paginated %}
<nav class="mt-4">
  <ul class="pagination justify-content-center">
    {% if page_obj.has_previous %}
    <li class="page-item">
      <a class="page-link" href="?page={{ page_obj.previous_page_number }}{% if request.GET.doctor_name %}&doctor_name={{ request.GET.doctor_name }}{% endif %}{% if request.GET.query %}&query={{ request.GET.query }}{% endif %}{% if request.GET.patient_name %}&patient_name={{ request.GET.patient_name }}{% endif %}{% if request.GET.specialization %}&specialization={{ request.GET.specialization }}{% endif %}">Previous</a>
    </li>
    {% endif %}
    <li class="page-item disabled"><span class="page-link">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span></li>
    {% if page_obj.has_next %}
    <li class="page-item">
      <a class="page-link" href="?page={{ page_obj.next_page_number }}{% if request.GET.doctor_name %}&doctor_name={{ request.GET.doctor_name }}{% endif %}{% if request.GET.query %}&query={{ request.GET.query }}{% endif %}{% if request.GET.patient_name %}&patient_name={{ request.GET.patient_name }}{% endif %}{% if request.GET.specialization %}&specialization={{ request.GET.specialization }}{% endif %}">Next</a>
    </li>
    {% endif %}
  </ul>
</nav>
{% endif %}
